name: Security Scan

on:
  push:
    branches: [ master, develop, improve-github-actions ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 2 * * 1'  # Weekly security scan on Mondays

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ubuntu-latest-x64-pip-security-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ubuntu-latest-x64-pip-security-
            ubuntu-latest-pip-security-
            ubuntu-latest-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
          pip install -r requirements.txt

      - name: Run Bandit security scan
        run: |
          echo "Running Bandit security scan..."
          bandit -r . -f json -o bandit-report.json -ll || true
          bandit -r . -f txt -ll || echo "Bandit found some issues, check the detailed report"

      - name: Run Safety dependency check
        run: |
          echo "Running Safety dependency vulnerability check..."
          safety check --json --output safety-report.json || true
          safety check || echo "Safety found some vulnerabilities, check the detailed report"

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3